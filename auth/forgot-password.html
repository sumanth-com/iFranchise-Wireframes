<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Forgot Password — iFranchise CRM</title>
  <link rel="stylesheet" href="../css/wireframe.css">
</head>
<body>
  <div class="wf-auth">
    <div class="wf-auth__card wf-card">
      <div class="wf-card__header"><span class="wf-card__title">Forgot Password</span></div>
      <div class="wf-card__body">
        <p style="font-size:13px;color:var(--wf-text-secondary);margin-bottom:16px">Enter your email and we'll send a reset link.</p>
        <form class="wf-form" onsubmit="event.preventDefault();alert('Reset link sent (wireframe)')">
          <div class="wf-form__group wf-mb-16">
            <label class="wf-form__label">Email</label>
            <input class="wf-form__input" type="email" placeholder="you@company.com" autocomplete="email">
          </div>
          <button type="submit" class="wf-btn wf-btn--primary" style="width:100%">Send Reset Link</button>
        </form>
        <p style="text-align:center;margin-top:16px;font-size:12px"><a href="login.html" style="min-height:44px;display:inline-flex;align-items:center">← Back to Login</a></p>
      </div>
    </div>
  </div>
</body>
</html>
