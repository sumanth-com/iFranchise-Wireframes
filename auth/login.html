<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login — iFranchise CRM</title>
  <link rel="stylesheet" href="../css/wireframe.css">
</head>
<body>
  <div class="wf-auth">
    <div class="wf-auth__card wf-card">
      <div class="wf-card__body">
        <div class="wf-auth__logo" style="text-align:center;margin-bottom:24px">
          <div class="wf-auth__logo-icon" aria-hidden="true">iF</div>
          <div class="wf-auth__title">iFranchise CRM</div>
          <div class="wf-auth__subtitle">Enterprise Edition</div>
        </div>
        <form class="wf-form" onsubmit="event.preventDefault();window.location.href='../dashboard/index.html'">
          <div class="wf-form__group wf-mb-16">
            <label class="wf-form__label wf-form__label--required">Email</label>
            <input class="wf-form__input" type="email" placeholder="you@company.com" value="abdul.syed@franchisecrm.com" autocomplete="email">
          </div>
          <div class="wf-form__group wf-mb-16">
            <label class="wf-form__label wf-form__label--required">Password</label>
            <input class="wf-form__input" type="password" placeholder="••••••••" value="password" autocomplete="current-password">
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:12px;flex-wrap:wrap;gap:8px">
            <label style="display:flex;align-items:center;gap:6px;min-height:44px"><input type="checkbox" checked> Remember me</label>
            <a href="forgot-password.html" style="min-height:44px;display:flex;align-items:center">Forgot password?</a>
          </div>
          <button type="submit" class="wf-btn wf-btn--primary" style="width:100%">Sign In</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
